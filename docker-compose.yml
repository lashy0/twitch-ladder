services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: ./scripts/start-api.sh
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/migrations:/app/migrations
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./apps/api/scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    ports:
     - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
