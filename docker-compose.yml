services:
  web:
    container_name: twitch-ladder-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    working_dir: /app/apps/web
    command: npm run dev
    environment:
      API_INTERNAL_BASE_URL: "http://api:8000"
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/components.json:/app/apps/web/components.json
      - ./apps/web/next.config.ts:/app/apps/web/next.config.ts
      - ./apps/web/package.json:/app/apps/web/package.json
      - ./apps/web/postcss.config.mjs:/app/apps/web/postcss.config.mjs
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json
      - web_next:/app/apps/web/.next
    depends_on:
      api:
        condition: service_started

  api:
    container_name: twitch-ladder-api
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: ./scripts/start-api.sh
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/migrations:/app/migrations
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./apps/api/scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    container_name: twitch-ladder-postgres
    image: postgres:17-alpine
    env_file:
      - .env
    ports:
     - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    container_name: twitch-ladder-redis
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  web_next:
  postgres_data:
  redis_data:
